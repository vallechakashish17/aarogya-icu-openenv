[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "aarogya-icu-openenv"
version = "0.1.0"
description = "A healthcare RL environment for ICU patient management simulation."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
    "pandas",
    "numpy",
    "requests"
]

[tool.setuptools]
packages = ["."]